apiVersion: events.ibm.com/v1beta1
kind: EventGateway
metadata:
  name: quick-start-gw
  labels:
    backup.events.ibm.com/component: eventgateway
    events.ibm.com/manager: <manager-instance-name>
spec:
  license:
    accept: false
    license: 'L-CYBH-K48BZQ'
    metric: VIRTUAL_PROCESSOR_CORE
    use: EventAutomationNonProduction
  listeners:
    - name: listener
      port: 8092
      groups:
        - name: group
          type: EXPLICIT
          maxNumKafkaBrokers: 3
  gatewayGroupName: <gateway-group>
  gatewayID: <gateway-id>
  template:
    pod:
      spec:
        containers:
          - name: egw
            resources:
              requests:
                cpu: '0.5'
                memory: 512Mi
              limits:
                cpu: '1'
                memory: 1Gi
